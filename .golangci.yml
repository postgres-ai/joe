version: "2"
run:
  issues-exit-code: 1
  tests: true
output:
  formats:
    text:
      path: stdout
      print-linter-name: true
      print-issued-lines: true
linters:
  enable:
    - dupl
    - gochecknoinits
    - goconst
    - gocritic
    - lll
    - misspell
    - mnd
    - prealloc
    - revive
    - staticcheck
    - unconvert
    - unparam
    - wsl_v5
  disable:
    - depguard
    - gocyclo
    - gosec
  settings:
    dupl:
      threshold: 120
    errcheck:
      check-type-assertions: false
      check-blank: false
      exclude-functions:
        - (*os.File).Close
    errorlint:
      errorf: true
      asserts: true
      comparison: true
    goconst:
      min-len: 3
      min-occurrences: 5
    gocritic:
      disabled-checks:
        - regexpMust
        - rangeValCopy
        - appendAssign
        - hugeParam
      enabled-tags:
        - performance
      disabled-tags:
        - experimental
    lll:
      line-length: 140
      tab-width: 1
    mnd:
      ignored-functions:
        - strconv.Format*
        - os.*
        - strconv.Parse*
        - strings.SplitN
        - bytes.SplitN
    nakedret:
      max-func-lines: 20
    prealloc:
      simple: true
      range-loops: true
      for-loops: true
    revive:
      confidence: 0.8
    staticcheck:
      checks:
        - all
    unparam:
      check-exported: false
    unused:
      exported-fields-are-used: false
    wsl_v5:
      allow-first-in-block: true
      allow-whole-block: false
      branch-max-lines: 2
  exclusions:
    generated: lax
    rules:
      - linters:
          - dupl
          - errcheck
          - gocyclo
          - lll
          - mnd
          - wsl_v5
        path: _test\.go
    paths:
      - vendor
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  new-from-rev: 33432c82a0a8d26108421b9be0a6aef4a8dbc1af
formatters:
  enable:
    - goimports
  settings:
    gofmt:
      simplify: true
    gofumpt:
      extra-rules: false
    goimports:
      local-prefixes:
        - gitlab.com/postgres-ai/database-lab
        - gitlab.com/postgres-ai/joe
  exclusions:
    generated: lax
    paths:
      - vendor
      - third_party$
      - builtin$
      - examples$
