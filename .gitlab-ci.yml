image: golang:1.26

include:
  - template: Security/SAST.gitlab-ci.yml
  - project: 'postgres-ai/infra'
    file: '/ci/templates/approval-check.yml'

variables:
  DOCKER_FILE: "Dockerfile"

# Run a single pipeline per change: MR pipeline when an MR is open, branch
# pipeline otherwise. Tags always trigger their own pipeline.
workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_PROJECT_ID != "11828313"
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: always
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    - if: $CI_COMMIT_BRANCH
      when: always
    - if: $CI_COMMIT_TAG
      when: always

stages:
  - test
  - build-binary
  - build-image

test:
  stage: test
  only:
    - branches
    - tags
    - merge_requests
  script:
    - make vet
    - make test

# Runs the HypoPG integration test (pkg/bot/command/hypo_integration_test.go,
# guarded by the `integration` build tag) against a real Postgres with HypoPG
# installed. `make test` does not pass -tags integration, so without this job the
# regression guard for the HypoPG 1.2.0 API change never runs in CI.
test-hypopg:
  stage: test
  image: golang:1.26
  only:
    - branches
    - tags
    - merge_requests
  variables:
    DEBIAN_FRONTEND: "noninteractive"
    JOE_TEST_HYPOPG_DSN: "postgres://postgres@127.0.0.1:5432/postgres?sslmode=disable"
  script:
    # Install PostgreSQL 17 and the HypoPG extension from the PGDG apt repo.
    - apt-get update
    - apt-get install -y postgresql-common gnupg
    - sh /usr/share/postgresql-common/pgdg/apt.postgresql.org.sh -y
    - apt-get install -y postgresql-17 postgresql-17-hypopg
    # Initialise and start a throwaway cluster on 127.0.0.1:5432 (trust auth).
    - chown -R postgres /tmp/pgdata 2>/dev/null || true
    - su postgres -c "/usr/lib/postgresql/17/bin/initdb -D /tmp/pgdata --auth-host=trust --auth-local=trust"
    - su postgres -c "/usr/lib/postgresql/17/bin/pg_ctl -D /tmp/pgdata -o '-c listen_addresses=127.0.0.1 -p 5432' -w start"
    # Run only the HypoPG integration tests against that cluster.
    - go test -tags integration ./pkg/bot/command/ -run Hypo -v

lint:
  stage: test
  image: golangci/golangci-lint:v2.11.4
  only:
    - branches
    - tags
    - merge_requests
  script:
    - golangci-lint run

# Run the pgexplain integration smoke test (build tag `integration`) against a
# real Postgres service across supported majors. This is what would have caught
# the PG18 fractional-rows EXPLAIN break against a live server. The job is
# parallelized across PG_MAJOR via a service container `postgres:$PG_MAJOR`;
# PGEXPLAIN_TEST_DSN points the test at that service.
test-pg-matrix:
  stage: test
  image: golang:1.26
  only:
    - branches
    - tags
    - merge_requests
  parallel:
    matrix:
      - PG_MAJOR: ["13", "14", "15", "16", "17", "18"]
  services:
    - name: postgres:$PG_MAJOR
      alias: postgres
      variables:
        POSTGRES_HOST_AUTH_METHOD: trust
        POSTGRES_DB: t
  variables:
    PGEXPLAIN_TEST_DSN: "postgres://postgres@postgres:5432/t?sslmode=disable"
  script:
    - go test -tags integration ./pkg/pgexplain/... -run Integration -v

# Same smoke test against PostgreSQL 19 (beta). Marked allow_failure because the
# `postgres:19beta1` image tag may not yet be published and PG19 is pre-release.
test-pg-matrix-19:
  stage: test
  image: golang:1.26
  allow_failure: true
  only:
    - branches
    - tags
    - merge_requests
  parallel:
    matrix:
      - PG_MAJOR: ["19beta1"]
  services:
    - name: postgres:$PG_MAJOR
      alias: postgres
      variables:
        POSTGRES_HOST_AUTH_METHOD: trust
        POSTGRES_DB: t
  variables:
    PGEXPLAIN_TEST_DSN: "postgres://postgres@postgres:5432/t?sslmode=disable"
  script:
    - go test -tags integration ./pkg/pgexplain/... -run Integration -v

# Byte-fidelity guard: for each supported major, capture a fixture battery as both
# FORMAT JSON (rendered through joe) and FORMAT TEXT (psql) against a live Postgres
# service and assert the normalized plan bodies are byte-identical. This catches the
# JSON->text rendering drift (missing lines, wrong captions, wrong line order) that
# joe-rendered goldens cannot. Mirrors test-pg-matrix's service + DSN + only:.
fidelity-pg-matrix:
  stage: test
  image: golang:1.26
  only:
    - branches
    - tags
    - merge_requests
  parallel:
    matrix:
      - PG_MAJOR: ["16", "17", "18"]
  services:
    - name: postgres:$PG_MAJOR
      alias: postgres
      variables:
        POSTGRES_HOST_AUTH_METHOD: trust
        POSTGRES_DB: t
  variables:
    PGEXPLAIN_TEST_DSN: "postgres://postgres@postgres:5432/t?sslmode=disable"
  script:
    - go test -tags integration ./pkg/pgexplain/... -run TestFidelityAgainstLiveServer -v

# Same fidelity guard against PostgreSQL 19 (beta). allow_failure because the
# `postgres:19beta1` image tag may not yet be published and PG19 is pre-release.
fidelity-pg-matrix-19:
  stage: test
  image: golang:1.26
  allow_failure: true
  only:
    - branches
    - tags
    - merge_requests
  parallel:
    matrix:
      - PG_MAJOR: ["19beta1"]
  services:
    - name: postgres:$PG_MAJOR
      alias: postgres
      variables:
        POSTGRES_HOST_AUTH_METHOD: trust
        POSTGRES_DB: t
  variables:
    PGEXPLAIN_TEST_DSN: "postgres://postgres@postgres:5432/t?sslmode=disable"
  script:
    - go test -tags integration ./pkg/pgexplain/... -run TestFidelityAgainstLiveServer -v

build-binary:
  stage: build-binary
  only:
    refs:
      - branches
      - tags
      - merge_requests
  artifacts:
    paths:
      - bin
  script:
    - make build
    - make build-ee

.job_template: &build_image_definition
  image: docker:28
  stage: build-image
  artifacts:
    paths:
      - bin
  services:
    - docker:dind
  script:
    - apk add --no-cache bash # TODO(anatoly): Remove dependency.
    - bash ./scripts/ci_docker_build_push.sh

.only_var_template: &only_tag_release
  only:
    variables:
      - $CI_COMMIT_TAG =~ /^[0-9.]+$/

.only_var_template: &only_tag_rc
  only:
    variables:
      - $CI_COMMIT_TAG =~ /^[0-9.]+[\-_]*[a-zA-Z]+[a-zA-Z0-9.\-_]*[a-zA-Z0-9]+$/

.only_var_template: &only_master
  only:
    - master

.only_var_template: &only_feature
  only:
    refs:
      - branches
      - tags
      - merge_requests
    variables:
      - $CI_COMMIT_TAG == null
      - $CI_COMMIT_REF_SLUG != "master"

build-image-feature:
  <<: *build_image_definition
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - if: $CI_COMMIT_REF_SLUG == "master"
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_PROJECT_ID == "11828313"
      when: on_success
    - if: $CI_COMMIT_BRANCH
      when: on_success
  variables:
    REGISTRY_USER: "${CI_REGISTRY_USER}"
    REGISTRY_PASSWORD: "${CI_REGISTRY_PASSWORD}"
    REGISTRY: "${CI_REGISTRY}"
    DOCKER_NAME: "registry.gitlab.com/postgres-ai/joe"
    TAGS: "${DOCKER_NAME}:${CI_COMMIT_REF_SLUG}"

build-image-master:
  <<: *build_image_definition
  <<: *only_master
  variables:
    DOCKER_NAME: "registry.gitlab.com/postgres-ai/joe"
    TAGS: "${DOCKER_NAME}:master,${DOCKER_NAME}:master-${CI_COMMIT_SHORT_SHA}"

build-image-latest:
  <<: *build_image_definition
  <<: *only_tag_release
  variables:
    REGISTRY_USER: "${DH_CI_REGISTRY_USER}"
    REGISTRY_PASSWORD: "${DH_CI_REGISTRY_PASSWORD}"
    REGISTRY: "${DH_CI_REGISTRY}"
    DOCKER_NAME: postgresai/joe
    TAGS: "${DOCKER_NAME}:latest,${DOCKER_NAME}:${CI_COMMIT_TAG}"

build-image-latest-dev-registry:
  <<: *build_image_definition
  <<: *only_tag_release
  variables:
    REGISTRY_USER: "${CI_REGISTRY_USER}"
    REGISTRY_PASSWORD: "${CI_REGISTRY_PASSWORD}"
    REGISTRY: "${CI_REGISTRY}"
    DOCKER_NAME: "registry.gitlab.com/postgres-ai/joe"
    TAGS: "${DOCKER_NAME}:${CI_COMMIT_TAG}"

build-image-release-dev-registry-ee:
  <<: *build_image_definition
  <<: *only_tag_release
  variables:
    REGISTRY_USER: "${CI_REGISTRY_USER}"
    REGISTRY_PASSWORD: "${CI_REGISTRY_PASSWORD}"
    REGISTRY: "${CI_REGISTRY}"
    DOCKER_NAME: "registry.gitlab.com/postgres-ai/joe"
    DOCKER_FILE: "Dockerfile.ee"
    TAGS: "${DOCKER_NAME}:${CI_COMMIT_TAG}-ee"

build-image-rc:
  <<: *build_image_definition
  <<: *only_tag_rc
  variables:
    REGISTRY_USER: "${DH_CI_REGISTRY_USER}"
    REGISTRY_PASSWORD: "${DH_CI_REGISTRY_PASSWORD}"
    REGISTRY: "${DH_CI_REGISTRY}"
    DOCKER_NAME: postgresai/joe
    TAGS: "${DOCKER_NAME}:${CI_COMMIT_TAG}"

build-image-rc-dev-registry:
  <<: *build_image_definition
  <<: *only_tag_rc
  variables:
    REGISTRY_USER: "${CI_REGISTRY_USER}"
    REGISTRY_PASSWORD: "${CI_REGISTRY_PASSWORD}"
    REGISTRY: "${CI_REGISTRY}"
    DOCKER_NAME: "registry.gitlab.com/postgres-ai/joe"
    TAGS: "${DOCKER_NAME}:${CI_COMMIT_TAG}"

build-image-rc-dev-registry-ee:
  <<: *build_image_definition
  <<: *only_tag_rc
  variables:
    REGISTRY_USER: "${CI_REGISTRY_USER}"
    REGISTRY_PASSWORD: "${CI_REGISTRY_PASSWORD}"
    REGISTRY: "${CI_REGISTRY}"
    DOCKER_NAME: "registry.gitlab.com/postgres-ai/joe"
    DOCKER_FILE: "Dockerfile.ee"
    TAGS: "${DOCKER_NAME}:${CI_COMMIT_TAG}-ee"